name: Rust CI

on:
  push:
    branches: [rust]
    paths:
      - 'crates/*/src/**'
      - 'crates/*/tests/**'
      - 'crates/*/Cargo.toml'
      - 'crates/web/ui/src/**'
      - 'crates/web/ui/package.json'
      - 'crates/web/ui/package-lock.json'
      - 'crates/web/ui/vite.config.ts'
      - 'crates/web/ui/tsconfig.json'
      - 'crates/web/ui/index.html'
      - 'crates/web/ui/e2e/**'
      - 'crates/web/ui/playwright.config.ts'
      - 'crates/web/build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'testdata/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    branches: [rust]

jobs:
  tier1:
    name: Format, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/web/ui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -W clippy::all
      - name: Install UI dependencies
        working-directory: crates/web/ui
        run: npm ci
      - name: Vitest unit tests
        working-directory: crates/web/ui
        run: npm run test
      - name: Test
        run: cargo test --workspace
      - name: Install Playwright browsers
        working-directory: crates/web/ui
        run: npx playwright install --with-deps chromium
      - name: Build binary for e2e
        run: cargo build -p inspectah-cli
      - name: Start refine server
        run: |
          if [ -f testdata/e2e-fixture.tar.gz ]; then
            ./target/debug/inspectah refine --open=false testdata/e2e-fixture.tar.gz &
            SERVER_PID=$!
            echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
            # Wait for server to be ready
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:8642/api/health > /dev/null 2>&1; then
                echo "Server ready after ${i}s"
                break
              fi
              sleep 1
            done
          else
            echo "::warning::No e2e fixture tarball found at testdata/e2e-fixture.tar.gz — skipping e2e tests"
            echo "SKIP_E2E=true" >> "$GITHUB_ENV"
          fi
      - name: Playwright e2e tests
        if: env.SKIP_E2E != 'true'
        working-directory: crates/web/ui
        run: npm run test:e2e
      - name: Stop refine server
        if: always() && env.SERVER_PID != ''
        run: kill $SERVER_PID || true
