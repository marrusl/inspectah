<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, 'RedHatText', 'Helvetica Neue', sans-serif">
  <title>Option B: Expandable Sidebar Section — Small Aggregate (3 hosts, expanded)</title>

  <!-- Background -->
  <rect width="1200" height="700" fill="#f0f0f0"/>

  <!-- ═══ StatsBar (sticky toolbar) ═══ -->
  <rect x="0" y="0" width="1200" height="44" fill="#ffffff"/>
  <line x1="0" y1="44" x2="1200" y2="44" stroke="#d2d2d2" stroke-width="1"/>

  <!-- Aggregate stats text (count is NOT clickable in this option) -->
  <text x="16" y="27" font-size="13" fill="#151515">
    <tspan font-weight="700">3</tspan>
    <tspan fill="#6a6e73"> hosts · </tspan>
    <tspan font-weight="700">1,247</tspan>
    <tspan fill="#6a6e73"> items · </tspan>
  </text>
  <rect x="184" y="14" rx="10" ry="10" width="96" height="20" fill="#e7f1e7"/>
  <text x="232" y="28" font-size="11" fill="#1e4620" text-anchor="middle">All reviewed</text>

  <!-- Right-side toolbar buttons -->
  <rect x="1000" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1015" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#8630;</text>
  <rect x="1036" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1051" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#8631;</text>
  <rect x="1072" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1087" y="27" font-size="11" fill="#6a6e73" text-anchor="middle">&#8615;</text>
  <rect x="1112" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1127" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#9789;</text>

  <!-- ═══ Sidebar (240px) ═══ -->
  <rect x="0" y="44" width="240" height="656" fill="#ffffff"/>
  <line x1="240" y1="44" x2="240" y2="700" stroke="#d2d2d2" stroke-width="1"/>

  <!-- ═══ EXPANDABLE SECTION (the main feature) — expanded ═══ -->
  <rect x="0" y="44" width="240" height="120" fill="#ffffff"/>

  <!-- Toggle header -->
  <g cursor="pointer">
    <rect x="0" y="44" width="240" height="32" fill="#fafafa"/>
    <!-- Down chevron (expanded state) -->
    <text x="16" y="65" font-size="10" fill="#6a6e73">&#9660;</text>
    <text x="30" y="65" font-size="13" fill="#151515" font-weight="600">Aggregate Hosts</text>
    <rect x="130" y="53" rx="10" ry="10" width="22" height="16" fill="#f0f0f0"/>
    <text x="141" y="64" font-size="10" fill="#6a6e73" text-anchor="middle">3</text>
  </g>

  <!-- Host list (monospace, indented) -->
  <text x="30" y="92" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">web-01</text>
  <text x="30" y="110" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">web-02</text>
  <text x="30" y="128" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">web-03</text>

  <!-- Divider between hosts and nav -->
  <line x1="0" y1="142" x2="240" y2="142" stroke="#d2d2d2" stroke-width="1"/>

  <!-- ═══ Highlight box around the expandable section ═══ -->
  <rect x="0" y="44" width="240" height="98" fill="none" stroke="#0066cc" stroke-width="2" stroke-dasharray="4,3" rx="0"/>

  <!-- Sidebar: Review group (pushed down by expanded section) -->
  <text x="16" y="170" font-size="11" fill="#6a6e73" font-weight="600" letter-spacing="0.08em">REVIEW</text>

  <!-- Active nav item -->
  <rect x="0" y="178" width="240" height="32" fill="#e7f1fa"/>
  <rect x="0" y="178" width="3" height="32" fill="#0066cc"/>
  <text x="16" y="199" font-size="13" fill="#0066cc" font-weight="600">Packages</text>
  <rect x="190" y="186" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="198" font-size="11" fill="#6a6e73" text-anchor="middle">42</text>

  <text x="16" y="231" font-size="13" fill="#151515">Config Files</text>
  <rect x="190" y="219" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="231" font-size="11" fill="#6a6e73" text-anchor="middle">18</text>

  <text x="16" y="263" font-size="13" fill="#151515">Services</text>
  <rect x="190" y="251" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="263" font-size="11" fill="#6a6e73" text-anchor="middle">7</text>

  <text x="16" y="304" font-size="11" fill="#6a6e73" font-weight="600" letter-spacing="0.08em">REFERENCE</text>
  <text x="16" y="331" font-size="13" fill="#151515">Containers</text>
  <rect x="190" y="319" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="331" font-size="11" fill="#6a6e73" text-anchor="middle">5</text>

  <text x="16" y="363" font-size="13" fill="#151515">Repositories</text>
  <rect x="190" y="351" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="363" font-size="11" fill="#6a6e73" text-anchor="middle">12</text>

  <!-- ═══ Main content area ═══ -->
  <rect x="240" y="44" width="960" height="656" fill="#f0f0f0"/>

  <!-- Decision list items -->
  <rect x="256" y="60" width="928" height="48" fill="#ffffff"/>
  <line x1="256" y1="108" x2="1184" y2="108" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="84" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="80" font-size="13" fill="#151515" font-weight="600">httpd</text>
  <text x="296" y="96" font-size="11" fill="#6a6e73">2.4.57-11.el9 → included on all hosts</text>
  <rect x="1088" y="72" rx="4" ry="4" width="80" height="24" fill="#e7f1e7"/>
  <text x="1128" y="88" font-size="11" fill="#1e4620" text-anchor="middle">3/3 hosts</text>

  <rect x="256" y="108" width="928" height="48" fill="#ffffff"/>
  <line x1="256" y1="156" x2="1184" y2="156" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="132" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="128" font-size="13" fill="#151515" font-weight="600">mod_ssl</text>
  <text x="296" y="144" font-size="11" fill="#6a6e73">1.1.1k-12.el9 → included on all hosts</text>
  <rect x="1088" y="120" rx="4" ry="4" width="80" height="24" fill="#e7f1e7"/>
  <text x="1128" y="136" font-size="11" fill="#1e4620" text-anchor="middle">3/3 hosts</text>

  <rect x="256" y="156" width="928" height="48" fill="#ffffff"/>
  <line x1="256" y1="204" x2="1184" y2="204" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="180" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="176" font-size="13" fill="#151515" font-weight="600">nginx</text>
  <text x="296" y="192" font-size="11" fill="#6a6e73">1.24.0-4.el9 → divergent (2 variants)</text>
  <rect x="1088" y="168" rx="4" ry="4" width="80" height="24" fill="#fef3cd"/>
  <text x="1128" y="184" font-size="11" fill="#664d03" text-anchor="middle">2/3 hosts</text>

  <rect x="256" y="204" width="928" height="48" fill="#ffffff"/>
  <line x1="256" y1="252" x2="1184" y2="252" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="228" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="224" font-size="13" fill="#151515" font-weight="600">curl</text>
  <text x="296" y="240" font-size="11" fill="#6a6e73">8.2.1-1.el9 → included on all hosts</text>
  <rect x="1088" y="216" rx="4" ry="4" width="80" height="24" fill="#e7f1e7"/>
  <text x="1128" y="232" font-size="11" fill="#1e4620" text-anchor="middle">3/3 hosts</text>

  <!-- ═══ Annotation ═══ -->
  <rect x="300" y="530" rx="4" ry="4" width="640" height="140" fill="#ffffff" stroke="#d2d2d2" stroke-width="1"/>
  <text x="320" y="556" font-size="14" fill="#151515" font-weight="700">Option B: Expandable Section in AggregateSidebar</text>
  <text x="320" y="576" font-size="12" fill="#6a6e73">Small aggregate (3 hosts) — shown expanded. Collapsed by default.</text>
  <text x="320" y="596" font-size="12" fill="#6a6e73">Toggle header shows "Aggregate Hosts" with badge count. Chevron indicates state.</text>
  <text x="320" y="616" font-size="12" fill="#6a6e73">Consistent with single-host mode's .inspectah-sidebar__host block position.</text>
  <text x="320" y="636" font-size="12" fill="#6a6e73">Sidebar nav is pushed down when expanded, but only ~100px for 3 hosts.</text>
  <text x="320" y="656" font-size="12" fill="#0066cc">PF components: ExpandableSection, Badge</text>
</svg>