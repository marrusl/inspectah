<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system, 'RedHatText', 'Helvetica Neue', sans-serif">
  <title>Option B: Expandable Sidebar Section — Large Aggregate (54 hosts, long FQDNs, expanded)</title>

  <!-- Background -->
  <rect width="1200" height="750" fill="#f0f0f0"/>

  <!-- ═══ StatsBar (sticky toolbar) ═══ -->
  <rect x="0" y="0" width="1200" height="44" fill="#ffffff"/>
  <line x1="0" y1="44" x2="1200" y2="44" stroke="#d2d2d2" stroke-width="1"/>

  <text x="16" y="27" font-size="13" fill="#151515">
    <tspan font-weight="700">54</tspan>
    <tspan fill="#6a6e73"> hosts · </tspan>
    <tspan font-weight="700">8,392</tspan>
    <tspan fill="#6a6e73"> items · </tspan>
  </text>
  <rect x="216" y="14" rx="10" ry="10" width="110" height="20" fill="#e7f1fa"/>
  <text x="271" y="28" font-size="11" fill="#0066cc" text-anchor="middle">12 need review</text>

  <rect x="1000" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1015" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#8630;</text>
  <rect x="1036" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1051" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#8631;</text>
  <rect x="1072" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1087" y="27" font-size="11" fill="#6a6e73" text-anchor="middle">&#8615;</text>
  <rect x="1112" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1127" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#9789;</text>

  <!-- ═══ Sidebar (240px) ═══ -->
  <rect x="0" y="44" width="240" height="706" fill="#ffffff"/>
  <line x1="240" y1="44" x2="240" y2="750" stroke="#d2d2d2" stroke-width="1"/>

  <!-- ═══ EXPANDABLE SECTION — expanded, large aggregate ═══ -->

  <!-- Toggle header -->
  <g cursor="pointer">
    <rect x="0" y="44" width="240" height="32" fill="#fafafa"/>
    <text x="16" y="65" font-size="10" fill="#6a6e73">&#9660;</text>
    <text x="30" y="65" font-size="13" fill="#151515" font-weight="600">Aggregate Hosts</text>
    <rect x="130" y="53" rx="10" ry="10" width="28" height="16" fill="#f0f0f0"/>
    <text x="144" y="64" font-size="10" fill="#6a6e73" text-anchor="middle">54</text>
  </g>

  <!-- Scrollable host list area (max-height: 200px) -->
  <defs>
    <clipPath id="sidebarHostClip">
      <rect x="0" y="76" width="240" height="200"/>
    </clipPath>
  </defs>

  <g clip-path="url(#sidebarHostClip)">
    <!-- FQDNs are aggressively truncated at 240px sidebar width -->
    <text x="30" y="92" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-01.datac...</text>
    <text x="30" y="108" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-02.datac...</text>
    <text x="30" y="124" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-03.datac...</text>
    <text x="30" y="140" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-04.datac...</text>
    <text x="30" y="156" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-05.datac...</text>
    <text x="30" y="172" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-01.datac...</text>
    <text x="30" y="188" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-02.datac...</text>
    <text x="30" y="204" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-03.datac...</text>
    <text x="30" y="220" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-04.datac...</text>
    <text x="30" y="236" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-05.datac...</text>
    <text x="30" y="252" font-size="10" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-api-east-01.datac...</text>
    <text x="30" y="268" font-size="10" fill="#6a6e73" font-family="'RedHatMono', 'SF Mono', monospace" font-style="italic">... 43 more (scroll)</text>
  </g>

  <!-- Inner scroll indicator -->
  <rect x="232" y="76" width="3" height="200" rx="1.5" fill="#f0f0f0"/>
  <rect x="232" y="76" width="3" height="55" rx="1.5" fill="#c9c9c9"/>

  <!-- Highlight box around the problem area -->
  <rect x="0" y="44" width="240" height="232" fill="none" stroke="#ee0000" stroke-width="2" stroke-dasharray="4,3" rx="0"/>

  <!-- Problem callout: aggressive truncation -->
  <line x1="240" y1="140" x2="300" y2="140" stroke="#ee0000" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="300" y="120" rx="4" ry="4" width="280" height="50" fill="#fff5f5" stroke="#ee0000" stroke-width="1"/>
  <text x="312" y="139" font-size="11" fill="#ee0000" font-weight="600">Problem: aggressive FQDN truncation</text>
  <text x="312" y="157" font-size="10" fill="#6a6e73">Only ~22 chars visible in 240px sidebar width.</text>

  <!-- Divider between hosts and nav -->
  <line x1="0" y1="276" x2="240" y2="276" stroke="#d2d2d2" stroke-width="1"/>

  <!-- Sidebar: Review group (pushed down significantly) -->
  <text x="16" y="300" font-size="11" fill="#6a6e73" font-weight="600" letter-spacing="0.08em">REVIEW</text>

  <rect x="0" y="308" width="240" height="32" fill="#e7f1fa"/>
  <rect x="0" y="308" width="3" height="32" fill="#0066cc"/>
  <text x="16" y="329" font-size="13" fill="#0066cc" font-weight="600">Packages</text>
  <rect x="182" y="316" rx="10" ry="10" width="44" height="18" fill="#f0f0f0"/>
  <text x="204" y="328" font-size="11" fill="#6a6e73" text-anchor="middle">312</text>

  <text x="16" y="361" font-size="13" fill="#151515">Config Files</text>
  <rect x="182" y="349" rx="10" ry="10" width="44" height="18" fill="#f0f0f0"/>
  <text x="204" y="361" font-size="11" fill="#6a6e73" text-anchor="middle">89</text>

  <text x="16" y="393" font-size="13" fill="#151515">Services</text>
  <rect x="190" y="381" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="393" font-size="11" fill="#6a6e73" text-anchor="middle">24</text>

  <text x="16" y="434" font-size="11" fill="#6a6e73" font-weight="600" letter-spacing="0.08em">REFERENCE</text>
  <text x="16" y="461" font-size="13" fill="#151515">Containers</text>
  <rect x="190" y="449" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="461" font-size="11" fill="#6a6e73" text-anchor="middle">8</text>

  <text x="16" y="493" font-size="13" fill="#151515">Repositories</text>
  <rect x="190" y="481" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="493" font-size="11" fill="#6a6e73" text-anchor="middle">31</text>

  <!-- ═══ Main content area ═══ -->
  <rect x="240" y="44" width="960" height="706" fill="#f0f0f0"/>

  <!-- Decision list items -->
  <rect x="256" y="60" width="928" height="48" fill="#ffffff"/>
  <line x1="256" y1="108" x2="1184" y2="108" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="84" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="80" font-size="13" fill="#151515" font-weight="600">httpd</text>
  <text x="296" y="96" font-size="11" fill="#6a6e73">2.4.57-11.el9</text>

  <rect x="256" y="108" width="928" height="48" fill="#ffffff"/>
  <line x1="256" y1="156" x2="1184" y2="156" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="132" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="128" font-size="13" fill="#151515" font-weight="600">mod_ssl</text>
  <text x="296" y="144" font-size="11" fill="#6a6e73">1.1.1k-12.el9</text>

  <rect x="256" y="156" width="928" height="48" fill="#ffffff"/>
  <line x1="256" y1="204" x2="1184" y2="204" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="180" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="176" font-size="13" fill="#151515" font-weight="600">nginx</text>
  <text x="296" y="192" font-size="11" fill="#6a6e73">1.24.0-4.el9</text>

  <!-- ═══ Annotation ═══ -->
  <rect x="300" y="580" rx="4" ry="4" width="640" height="140" fill="#ffffff" stroke="#d2d2d2" stroke-width="1"/>
  <text x="320" y="606" font-size="14" fill="#151515" font-weight="700">Option B: Expandable Sidebar Section — Large Aggregate Pain Point</text>
  <text x="320" y="626" font-size="12" fill="#6a6e73">54 hosts with long FQDNs — shown expanded with max-height: 200px scroll area.</text>
  <text x="320" y="646" font-size="12" fill="#ee0000">FQDNs aggressively truncated at ~22 chars in 240px sidebar. Scroll-within-scroll.</text>
  <text x="320" y="666" font-size="12" fill="#6a6e73">Section nav pushed down 230px+ below the fold. Sidebar feels heavy.</text>
  <text x="320" y="686" font-size="12" fill="#6a6e73">Also: sidebar hidden below 1024px viewport — hostnames become inaccessible.</text>
  <text x="320" y="706" font-size="12" fill="#0066cc">PF components: ExpandableSection, Badge</text>
</svg>