<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="-apple-system, 'RedHatText', 'Helvetica Neue', sans-serif">
  <title>Option A: Inline Popover — Large Fleet (54 hosts, long FQDNs)</title>

  <!-- Background -->
  <rect width="1200" height="750" fill="#f0f0f0"/>

  <!-- ═══ StatsBar (sticky toolbar) ═══ -->
  <rect x="0" y="0" width="1200" height="44" fill="#ffffff"/>
  <line x1="0" y1="44" x2="1200" y2="44" stroke="#d2d2d2" stroke-width="1"/>

  <!-- Fleet stats text -->
  <text x="16" y="27" font-size="13" fill="#151515">
    <tspan font-weight="700" fill="#0066cc" text-decoration="underline" cursor="pointer">54 hosts</tspan>
    <tspan fill="#6a6e73"> · </tspan>
    <tspan font-weight="700">8,392</tspan>
    <tspan fill="#6a6e73"> items · </tspan>
  </text>
  <!-- "12 need review" label -->
  <rect x="216" y="14" rx="10" ry="10" width="110" height="20" fill="#e7f1fa"/>
  <text x="271" y="28" font-size="11" fill="#0066cc" text-anchor="middle">12 need review</text>

  <!-- Right-side toolbar buttons -->
  <rect x="1000" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1015" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#8630;</text>
  <rect x="1036" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1051" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#8631;</text>
  <rect x="1072" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1087" y="27" font-size="11" fill="#6a6e73" text-anchor="middle">&#8615;</text>
  <rect x="1112" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1127" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#9789;</text>

  <!-- ═══ Sidebar (240px) ═══ -->
  <rect x="0" y="44" width="240" height="706" fill="#ffffff"/>
  <line x1="240" y1="44" x2="240" y2="750" stroke="#d2d2d2" stroke-width="1"/>

  <text x="16" y="76" font-size="11" fill="#6a6e73" font-weight="600" letter-spacing="0.08em">REVIEW</text>
  <rect x="0" y="84" width="240" height="32" fill="#e7f1fa"/>
  <rect x="0" y="84" width="3" height="32" fill="#0066cc"/>
  <text x="16" y="105" font-size="13" fill="#0066cc" font-weight="600">Packages</text>
  <rect x="182" y="92" rx="10" ry="10" width="44" height="18" fill="#f0f0f0"/>
  <text x="204" y="104" font-size="11" fill="#6a6e73" text-anchor="middle">312</text>

  <text x="16" y="137" font-size="13" fill="#151515">Config Files</text>
  <rect x="182" y="125" rx="10" ry="10" width="44" height="18" fill="#f0f0f0"/>
  <text x="204" y="137" font-size="11" fill="#6a6e73" text-anchor="middle">89</text>

  <text x="16" y="169" font-size="13" fill="#151515">Services</text>
  <rect x="190" y="157" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="169" font-size="11" fill="#6a6e73" text-anchor="middle">24</text>

  <text x="16" y="210" font-size="11" fill="#6a6e73" font-weight="600" letter-spacing="0.08em">REFERENCE</text>
  <text x="16" y="237" font-size="13" fill="#151515">Containers</text>
  <rect x="190" y="225" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="237" font-size="11" fill="#6a6e73" text-anchor="middle">8</text>

  <text x="16" y="269" font-size="13" fill="#151515">Repositories</text>
  <rect x="190" y="257" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="269" font-size="11" fill="#6a6e73" text-anchor="middle">31</text>

  <!-- ═══ Main content area ═══ -->
  <rect x="240" y="44" width="960" height="706" fill="#f0f0f0"/>

  <!-- Decision list items (faded behind popover) -->
  <g opacity="0.4">
    <rect x="256" y="60" width="928" height="48" fill="#ffffff"/>
    <line x1="256" y1="108" x2="1184" y2="108" stroke="#d2d2d2" stroke-width="1"/>
    <text x="296" y="80" font-size="13" fill="#151515" font-weight="600">httpd</text>
    <text x="296" y="96" font-size="11" fill="#6a6e73">2.4.57-11.el9</text>

    <rect x="256" y="108" width="928" height="48" fill="#ffffff"/>
    <line x1="256" y1="156" x2="1184" y2="156" stroke="#d2d2d2" stroke-width="1"/>
    <text x="296" y="128" font-size="13" fill="#151515" font-weight="600">mod_ssl</text>
    <text x="296" y="144" font-size="11" fill="#6a6e73">1.1.1k-12.el9</text>

    <rect x="256" y="156" width="928" height="48" fill="#ffffff"/>
    <line x1="256" y1="204" x2="1184" y2="204" stroke="#d2d2d2" stroke-width="1"/>
    <text x="296" y="176" font-size="13" fill="#151515" font-weight="600">nginx</text>
    <text x="296" y="192" font-size="11" fill="#6a6e73">1.24.0-4.el9</text>

    <rect x="256" y="204" width="928" height="48" fill="#ffffff"/>
    <line x1="256" y1="252" x2="1184" y2="252" stroke="#d2d2d2" stroke-width="1"/>
    <text x="296" y="224" font-size="13" fill="#151515" font-weight="600">curl</text>
    <text x="296" y="240" font-size="11" fill="#6a6e73">8.2.1-1.el9</text>
  </g>

  <!-- ═══ POPOVER (large fleet, scrollable) ═══ -->
  <defs>
    <filter id="popoverShadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <clipPath id="hostListClip">
      <rect x="28" y="90" width="310" height="300"/>
    </clipPath>
  </defs>

  <!-- Popover arrow -->
  <polygon points="72,44 82,54 62,54" fill="#ffffff" stroke="#d2d2d2" stroke-width="1"/>
  <line x1="62" y1="54" x2="82" y2="54" stroke="#ffffff" stroke-width="2"/>

  <!-- Popover body (wider for FQDNs) -->
  <rect x="16" y="54" width="340" height="360" rx="6" fill="#ffffff" stroke="#d2d2d2" stroke-width="1" filter="url(#popoverShadow2)"/>

  <!-- Popover title with count -->
  <text x="28" y="78" font-size="13" fill="#151515" font-weight="700">Fleet Hosts</text>
  <rect x="112" y="66" rx="10" ry="10" width="32" height="18" fill="#f0f0f0"/>
  <text x="128" y="78" font-size="11" fill="#6a6e73" text-anchor="middle">54</text>
  <line x1="28" y1="86" x2="344" y2="86" stroke="#d2d2d2" stroke-width="1"/>

  <!-- Host list (monospace, scrollable area) -->
  <g clip-path="url(#hostListClip)">
    <text x="28" y="106" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-01.datacenter.example.com</text>
    <text x="28" y="124" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-02.datacenter.example.com</text>
    <text x="28" y="142" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-03.datacenter.example.com</text>
    <text x="28" y="160" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-04.datacenter.example.com</text>
    <text x="28" y="178" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-east-05.datacenter.example.com</text>
    <text x="28" y="196" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-01.datacenter.example.com</text>
    <text x="28" y="214" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-02.datacenter.example.com</text>
    <text x="28" y="232" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-03.datacenter.example.com</text>
    <text x="28" y="250" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-04.datacenter.example.com</text>
    <text x="28" y="268" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-web-west-05.datacenter.example.com</text>
    <text x="28" y="286" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-api-east-01.datacenter.example.com</text>
    <text x="28" y="304" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-api-east-02.datacenter.example.com</text>
    <text x="28" y="322" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-api-east-03.datacenter.example.com</text>
    <text x="28" y="340" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-api-west-01.datacenter.example.com</text>
    <text x="28" y="358" font-size="11" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">prod-api-west-02.datacenter.example.com</text>
    <text x="28" y="376" font-size="11" fill="#6a6e73" font-family="'RedHatMono', 'SF Mono', monospace" font-style="italic">... 39 more below (scroll)</text>
  </g>

  <!-- Scroll indicator (thin scrollbar on right edge) -->
  <rect x="346" y="90" width="4" height="300" rx="2" fill="#f0f0f0"/>
  <rect x="346" y="90" width="4" height="80" rx="2" fill="#c9c9c9"/>

  <!-- Copy all button -->
  <text x="28" y="404" font-size="11" fill="#0066cc" cursor="pointer">Copy all</text>

  <!-- ═══ Annotation ═══ -->
  <rect x="300" y="580" rx="4" ry="4" width="640" height="140" fill="#ffffff" stroke="#d2d2d2" stroke-width="1"/>
  <text x="320" y="606" font-size="14" fill="#151515" font-weight="700">Option A: Inline Popover from StatsBar</text>
  <text x="320" y="626" font-size="12" fill="#6a6e73">Large fleet (54 hosts with long FQDNs like prod-web-east-01.datacenter.example.com)</text>
  <text x="320" y="646" font-size="12" fill="#6a6e73">Popover is wider (340px) to accommodate FQDNs. Max-height with scroll.</text>
  <text x="320" y="666" font-size="12" fill="#6a6e73">Count badge in header. Full hostnames visible — no truncation needed at this width.</text>
  <text x="320" y="686" font-size="12" fill="#6a6e73">"Copy all" affordance at bottom for ops workflows.</text>
  <text x="320" y="706" font-size="12" fill="#0066cc">Scales cleanly: 3 hosts or 100+ hosts, same interaction pattern.</text>
</svg>