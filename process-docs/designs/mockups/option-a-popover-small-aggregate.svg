<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, 'RedHatText', 'Helvetica Neue', sans-serif">
  <title>Option A: Inline Popover — Small Aggregate (3 hosts)</title>

  <!-- Background -->
  <rect width="1200" height="700" fill="#f0f0f0"/>

  <!-- ═══ StatsBar (sticky toolbar) ═══ -->
  <rect x="0" y="0" width="1200" height="44" fill="#ffffff"/>
  <line x1="0" y1="44" x2="1200" y2="44" stroke="#d2d2d2" stroke-width="1"/>

  <!-- Aggregate stats text -->
  <text x="16" y="27" font-size="13" fill="#151515">
    <tspan font-weight="700" fill="#0066cc" text-decoration="underline" cursor="pointer">3 hosts</tspan>
    <tspan fill="#6a6e73"> · </tspan>
    <tspan font-weight="700">1,247</tspan>
    <tspan fill="#6a6e73"> items · </tspan>
  </text>
  <!-- "All reviewed" label -->
  <rect x="196" y="14" rx="10" ry="10" width="96" height="20" fill="#e7f1e7"/>
  <text x="244" y="28" font-size="11" fill="#1e4620" text-anchor="middle">All reviewed</text>

  <!-- Right-side toolbar buttons -->
  <!-- Undo -->
  <rect x="1000" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1015" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#8630;</text>
  <!-- Redo -->
  <rect x="1036" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1051" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#8631;</text>
  <!-- Export -->
  <rect x="1072" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1087" y="27" font-size="11" fill="#6a6e73" text-anchor="middle">&#8615;</text>
  <!-- Theme toggle (sun) -->
  <rect x="1112" y="8" rx="4" ry="4" width="30" height="28" fill="none" stroke="#d2d2d2" stroke-width="1"/>
  <text x="1127" y="27" font-size="14" fill="#6a6e73" text-anchor="middle">&#9789;</text>

  <!-- ═══ Sidebar (240px) ═══ -->
  <rect x="0" y="44" width="240" height="656" fill="#ffffff"/>
  <line x1="240" y1="44" x2="240" y2="700" stroke="#d2d2d2" stroke-width="1"/>

  <!-- Sidebar: Review group -->
  <text x="16" y="76" font-size="11" fill="#6a6e73" font-weight="600" letter-spacing="0.08em">REVIEW</text>
  <!-- Active nav item -->
  <rect x="0" y="84" width="240" height="32" fill="#e7f1fa"/>
  <rect x="0" y="84" width="3" height="32" fill="#0066cc"/>
  <text x="16" y="105" font-size="13" fill="#0066cc" font-weight="600">Packages</text>
  <rect x="190" y="92" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="104" font-size="11" fill="#6a6e73" text-anchor="middle">42</text>

  <!-- Config Files -->
  <text x="16" y="137" font-size="13" fill="#151515">Config Files</text>
  <rect x="190" y="125" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="137" font-size="11" fill="#6a6e73" text-anchor="middle">18</text>

  <!-- Services -->
  <text x="16" y="169" font-size="13" fill="#151515">Services</text>
  <rect x="190" y="157" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="169" font-size="11" fill="#6a6e73" text-anchor="middle">7</text>

  <!-- Reference group -->
  <text x="16" y="210" font-size="11" fill="#6a6e73" font-weight="600" letter-spacing="0.08em">REFERENCE</text>
  <text x="16" y="237" font-size="13" fill="#151515">Containers</text>
  <rect x="190" y="225" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="237" font-size="11" fill="#6a6e73" text-anchor="middle">5</text>

  <text x="16" y="269" font-size="13" fill="#151515">Repositories</text>
  <rect x="190" y="257" rx="10" ry="10" width="36" height="18" fill="#f0f0f0"/>
  <text x="208" y="269" font-size="11" fill="#6a6e73" text-anchor="middle">12</text>

  <!-- ═══ Main content area ═══ -->
  <rect x="240" y="44" width="960" height="656" fill="#f0f0f0"/>

  <!-- Decision list items (packages) -->
  <!-- Item 1 -->
  <rect x="256" y="60" width="928" height="48" rx="0" fill="#ffffff"/>
  <line x1="256" y1="108" x2="1184" y2="108" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="84" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="80" font-size="13" fill="#151515" font-weight="600">httpd</text>
  <text x="296" y="96" font-size="11" fill="#6a6e73">2.4.57-11.el9 → included on all hosts</text>
  <rect x="1088" y="72" rx="4" ry="4" width="80" height="24" fill="#e7f1e7"/>
  <text x="1128" y="88" font-size="11" fill="#1e4620" text-anchor="middle">3/3 hosts</text>

  <!-- Item 2 -->
  <rect x="256" y="108" width="928" height="48" rx="0" fill="#ffffff"/>
  <line x1="256" y1="156" x2="1184" y2="156" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="132" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="128" font-size="13" fill="#151515" font-weight="600">mod_ssl</text>
  <text x="296" y="144" font-size="11" fill="#6a6e73">1.1.1k-12.el9 → included on all hosts</text>
  <rect x="1088" y="120" rx="4" ry="4" width="80" height="24" fill="#e7f1e7"/>
  <text x="1128" y="136" font-size="11" fill="#1e4620" text-anchor="middle">3/3 hosts</text>

  <!-- Item 3 -->
  <rect x="256" y="156" width="928" height="48" rx="0" fill="#ffffff"/>
  <line x1="256" y1="204" x2="1184" y2="204" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="180" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="176" font-size="13" fill="#151515" font-weight="600">nginx</text>
  <text x="296" y="192" font-size="11" fill="#6a6e73">1.24.0-4.el9 → divergent (2 variants)</text>
  <rect x="1088" y="168" rx="4" ry="4" width="80" height="24" fill="#fef3cd"/>
  <text x="1128" y="184" font-size="11" fill="#664d03" text-anchor="middle">2/3 hosts</text>

  <!-- Item 4 -->
  <rect x="256" y="204" width="928" height="48" rx="0" fill="#ffffff"/>
  <line x1="256" y1="252" x2="1184" y2="252" stroke="#d2d2d2" stroke-width="1"/>
  <circle cx="278" cy="228" r="8" fill="none" stroke="#d2d2d2" stroke-width="1.5"/>
  <text x="296" y="224" font-size="13" fill="#151515" font-weight="600">curl</text>
  <text x="296" y="240" font-size="11" fill="#6a6e73">8.2.1-1.el9 → included on all hosts</text>
  <rect x="1088" y="216" rx="4" ry="4" width="80" height="24" fill="#e7f1e7"/>
  <text x="1128" y="232" font-size="11" fill="#1e4620" text-anchor="middle">3/3 hosts</text>

  <!-- ═══ POPOVER (the main feature) ═══ -->
  <!-- Popover arrow -->
  <polygon points="60,44 70,54 50,54" fill="#ffffff" stroke="#d2d2d2" stroke-width="1"/>
  <line x1="50" y1="54" x2="70" y2="54" stroke="#ffffff" stroke-width="2"/>

  <!-- Popover body -->
  <rect x="16" y="54" width="220" height="130" rx="6" fill="#ffffff" stroke="#d2d2d2" stroke-width="1" filter="url(#popoverShadow)"/>

  <!-- Popover title -->
  <text x="28" y="76" font-size="13" fill="#151515" font-weight="700">Aggregate Hosts</text>
  <line x1="28" y1="84" x2="224" y2="84" stroke="#d2d2d2" stroke-width="1"/>

  <!-- Host list (monospace) -->
  <text x="28" y="104" font-size="12" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">web-01</text>
  <text x="28" y="122" font-size="12" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">web-02</text>
  <text x="28" y="140" font-size="12" fill="#151515" font-family="'RedHatMono', 'SF Mono', monospace">web-03</text>

  <!-- Copy all button -->
  <text x="28" y="170" font-size="11" fill="#0066cc" cursor="pointer">Copy all</text>

  <!-- Shadow filter -->
  <defs>
    <filter id="popoverShadow" x="-4" y="-2" width="232" height="142">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ═══ Annotation ═══ -->
  <rect x="300" y="530" rx="4" ry="4" width="640" height="120" fill="#ffffff" stroke="#d2d2d2" stroke-width="1"/>
  <text x="320" y="556" font-size="14" fill="#151515" font-weight="700">Option A: Inline Popover from StatsBar</text>
  <text x="320" y="576" font-size="12" fill="#6a6e73">Small aggregate (3 hosts: web-01, web-02, web-03)</text>
  <text x="320" y="596" font-size="12" fill="#6a6e73">Click the "3 hosts" link in the StatsBar to open the popover.</text>
  <text x="320" y="616" font-size="12" fill="#6a6e73">Zero layout cost when closed. Monospace hostname list, sorted alphabetically.</text>
  <text x="320" y="636" font-size="12" fill="#0066cc">PF components: Popover, Button variant="link", Content</text>
</svg>