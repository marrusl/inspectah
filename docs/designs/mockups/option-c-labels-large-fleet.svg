  <text x="320" y="676" font-size="14" fill="#151515" font-weight="700">Option C: Compact Label Strip — Large Fleet Problem</text>
  <text x="320" y="696" font-size="12" fill="#6a6e73">54 hosts with FQDNs — collapsed shows 5 labels + "+49 more" link.</text>
  <text x="320" y="716" font-size="12" fill="#ee0000">Expanded: ~120px of visually noisy labels push content off screen.</text>
  <text x="320" y="736" font-size="12" fill="#6a6e73">Individual labels have visual weight (borders, backgrounds) that compounds at scale.</text>
  <text x="320" y="756" font-size="12" fill="#6a6e73">Information users check once, then ignore — permanent space cost not justified.</text>
  <text x="320" y="776" font-size="12" fill="#0066cc">PF components: Label isCompact color="grey", Button variant="link"</text>
</svg>