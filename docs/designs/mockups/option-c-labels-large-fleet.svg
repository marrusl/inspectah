<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="-apple-system, 'RedHatText', 'Helvetica Neue', sans-serif">
  <title>Option C: Compact Label Strip — Large Fleet (54 hosts, collapsed then expanded)</title>

