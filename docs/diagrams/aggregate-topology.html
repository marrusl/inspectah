<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inspectah - Aggregate Topology</title>
  <style>
    /* Diagram-specific overrides layered on top of shared theme */
    .flow-dot {
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .flow-dot { display: none !important; }
      .refine-loop-dot { display: none !important; }
      .loop-dash-animate { animation: none !important; }
    }
    @keyframes dash-march {
      to { stroke-dashoffset: -26; }
    }
    .loop-dash-animate {
      animation: dash-march 1.2s linear infinite;
    }
    .future-group {
      opacity: 0.4;
    }
    .future-group:hover,
    .future-group:focus-within {
      opacity: 0.65;
      transition: opacity 200ms ease;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
<script type="module">
import * as d3 from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';
import { createDiagramShell } from './shared/embed.js';
import { colors, textDim, text as textColor, surface, border } from './shared/theme.js';
import { setupTooltip, toggleExpand, centerView } from './shared/interactions.js';
import { setupKeyboardNav, checkReducedMotion } from './shared/accessibility.js';

// ─── Node data ──────────────────────────────────────────────────────
const hosts = [
  { id: 'web01',  label: 'web-01',  sublabel: 'RHEL 9.4',            color: 'blue' },
  { id: 'web02',  label: 'web-02',  sublabel: 'RHEL 9.4',            color: 'blue' },
  { id: 'web03',  label: 'web-03',  sublabel: 'CentOS Stream 9',     color: 'blue' },
  { id: 'db01',   label: 'db-01',   sublabel: 'RHEL 8.9',            color: 'blue' },
];

const aggregateOps = [
  {
    id: 'aggregate',
    label: 'Aggregate Aggregate',
    sublabel: 'Consensus Matrix',
    color: 'rose',
    tooltip: 'Combines per-host snapshots into a aggregate-wide consensus view. Identifies common packages, shared configs, and divergent state. Applies prevalence-based include narrowing.',
    children: [
      { text: 'Package consensus', detail: 'Identify packages common to all hosts vs. host-specific additions' },
      { text: 'Config convergence', detail: 'Detect configuration drift between hosts' },
      { text: 'Service alignment', detail: 'Compare enabled/running services across aggregate' },
      { text: 'Repository union', detail: 'Combine repo definitions, flag per-host extras' },
      { text: 'Subscription merge', detail: 'Deduplicate subscription certs across hosts by latest expiry (--ack-sensitive required)' },
      { text: 'Include narrowing', detail: 'Prevalence-based narrowing — items below consensus threshold get include: false' },
      { text: 'Locked enforcement', detail: 'After narrowing, affected items get locked: true to prevent re-toggling in refine' },
    ],
  },
  {
    id: 'refine',
    label: 'Aggregate Refine',
    sublabel: 'Iterate & Decide',
    color: 'rose',
    tooltip: 'Interactive review of aggregate consensus. Accept, reject, or modify aggregate decisions. Iterate until aggregate plan is satisfactory.',
    children: [
      { text: 'Section-by-section review', detail: 'Packages, configs, services, repos reviewed independently' },
      { text: 'Include/exclude toggles', detail: 'Decide what goes into the shared base image' },
      { text: 'Per-host overrides', detail: 'Mark items as host-specific instead of aggregate-wide' },
      { text: 'Iterate until done', detail: 'Refine loop: review, adjust, re-evaluate consensus' },
    ],
  },
];

const artifacts = [
  {
    id: 'containerfiles',
    label: 'Containerfiles',
    sublabel: 'Per-Host Build Defs',
    color: 'orange',
    tooltip: 'Generated Containerfile for each host in the aggregate, based on aggregate consensus plus host-specific additions.',
    children: [
      { text: 'Shared base layers', detail: 'Common packages and configs from consensus' },
      { text: 'Host-specific additions', detail: 'Packages/configs unique to each host' },
      { text: 'Build-ready', detail: 'Ready for podman/docker build' },
    ],
  },
  {
    id: 'reports',
    label: 'Aggregate Reports',
    sublabel: 'Migration Summary',
    color: 'orange',
    tooltip: 'Aggregate-wide migration report summarizing consensus decisions, per-host deltas, and recommended actions.',
    children: [
      { text: 'Consensus summary', detail: 'What the aggregate agreed on' },
      { text: 'Divergence report', detail: 'Where hosts differ and why' },
      { text: 'Migration plan', detail: 'Ordered steps for aggregate-wide migration' },
    ],
  },
];

const futureNodes = [
  {
    id: 'architect',
    label: 'Architect',
    sublabel: 'Image Composition',
    color: 'purple',
    tooltip: 'Planned capability — build-time image composition, not runtime layer boundaries.',
    children: [
      { text: 'Base layer', detail: 'Shared OS foundation from aggregate consensus' },
      { text: 'App layer', detail: 'Application-specific packages and configs' },
      { text: 'Role layer', detail: 'Role-based customization (web, db, worker)' },
    ],
  },
];

// ─── Shell setup ────────────────────────────────────────────────────
const { svg, g, width, height, zoom } = createDiagramShell({
  title: 'inspectah',
  subtitle: 'Aggregate Topology',
  backUrl: '../how-to/aggregate-aggregation.html',
  legendItems: [
    { color: colors.blue.stroke,   label: 'Hosts' },
    { color: colors.rose.stroke,   label: 'Aggregate Ops' },
    { color: colors.orange.stroke, label: 'Output' },
    { color: colors.purple.stroke, label: 'Future' },
  ],
});

const reducedMotion = checkReducedMotion();
const tooltip = setupTooltip(document.body);
const expanded = new Map();

// ─── Layout constants ──────────────────────────────────────────────
const nodeW = 160;
const nodeH = 56;
const hostGap = 32;
const rowGap = 100;

// Row 1: Hosts (centered)
const totalHostW = hosts.length * (nodeW + hostGap) - hostGap;
const hostStartX = (width - totalHostW) / 2;
const hostY = 80;

hosts.forEach((h, i) => {
  h.x = hostStartX + i * (nodeW + hostGap);
  h.y = hostY;
});

// Row 2: Aggregate ops (centered, 2 nodes)
const opsGap = 80;
const totalOpsW = aggregateOps.length * (nodeW + opsGap) - opsGap;
const opsStartX = (width - totalOpsW) / 2;
const opsY = hostY + nodeH + rowGap;

aggregateOps.forEach((op, i) => {
  op.x = opsStartX + i * (nodeW + opsGap);
  op.y = opsY;
});

// Row 3: Artifacts (centered, 2 nodes)
const artGap = 80;
const totalArtW = artifacts.length * (nodeW + artGap) - artGap;
const artStartX = (width - totalArtW) / 2;
const artY = opsY + nodeH + rowGap;

artifacts.forEach((a, i) => {
  a.x = artStartX + i * (nodeW + artGap);
  a.y = artY;
});

// Row 4: Future (centered, 1 node)
const futureY = artY + nodeH + rowGap + 20;
futureNodes.forEach(f => {
  f.x = (width - nodeW) / 2;
  f.y = futureY;
});

// All interactive nodes for keyboard nav
const allNodes = [...hosts, ...aggregateOps, ...artifacts, ...futureNodes];

// ─── Draw connectors ───────────────────────────────────────────────
const connectors = g.append('g').attr('class', 'connectors');

// Host → Aggregate (fan-in)
const agg = aggregateOps[0];
hosts.forEach(h => {
  connectors.append('line')
    .attr('class', 'link')
    .attr('x1', h.x + nodeW / 2)
    .attr('y1', h.y + nodeH)
    .attr('x2', agg.x + nodeW / 2)
    .attr('y2', agg.y)
    .attr('stroke', border)
    .attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arrow-default)');
});

// Aggregate → Refine
const ref = aggregateOps[1];
connectors.append('line')
  .attr('class', 'link')
  .attr('x1', agg.x + nodeW)
  .attr('y1', agg.y + nodeH / 2)
  .attr('x2', ref.x)
  .attr('y2', ref.y + nodeH / 2)
  .attr('stroke', border)
  .attr('stroke-width', 1.5)
  .attr('marker-end', 'url(#arrow-default)');

// Refine → Artifacts (fan-out)
artifacts.forEach(a => {
  connectors.append('line')
    .attr('class', 'link')
    .attr('x1', ref.x + nodeW / 2)
    .attr('y1', ref.y + nodeH)
    .attr('x2', a.x + nodeW / 2)
    .attr('y2', a.y)
    .attr('stroke', border)
    .attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arrow-default)');
});

// Artifacts → Architect (future, dashed)
const arch = futureNodes[0];
const artCenterX = artStartX + totalArtW / 2;
connectors.append('line')
  .attr('class', 'link')
  .attr('x1', artCenterX)
  .attr('y1', artY + nodeH + 10)
  .attr('x2', arch.x + nodeW / 2)
  .attr('y2', arch.y)
  .attr('stroke', colors.purple.stroke)
  .attr('stroke-width', 1.5)
  .attr('stroke-dasharray', '6,4')
  .attr('opacity', 0.4)
  .attr('marker-end', 'url(#arrow-default)');

// ─── Refine self-loop (animated arc) ───────────────────────────────
const loopGroup = g.append('g').attr('class', 'refine-loop');

const loopCx = ref.x + nodeW + 30;
const loopCy = ref.y + nodeH / 2;
const loopR = 28;

// Arc path (270-degree arc returning to itself)
const loopPath = loopGroup.append('path')
  .attr('id', 'refine-loop-path')
  .attr('d', `M${ref.x + nodeW},${loopCy - 4}
    C${loopCx + loopR},${loopCy - loopR * 1.6}
     ${loopCx + loopR},${loopCy + loopR * 1.6}
     ${ref.x + nodeW},${loopCy + 4}`)
  .attr('fill', 'none')
  .attr('stroke', colors.rose.stroke)
  .attr('stroke-width', 1.5)
  .attr('stroke-dasharray', '8,5')
  .attr('marker-end', 'url(#arrow-default)');

if (!reducedMotion) {
  loopPath.attr('class', 'loop-dash-animate');
}

// Loop label
loopGroup.append('text')
  .attr('x', loopCx + loopR + 6)
  .attr('y', loopCy + 4)
  .attr('text-anchor', 'start')
  .attr('fill', colors.rose.text)
  .attr('font-size', '10px')
  .attr('font-weight', 500)
  .attr('opacity', 0.8)
  .text('iterate');

// Animated dot on loop (reduced-motion aware)
if (!reducedMotion) {
  const loopDot = loopGroup.append('circle')
    .attr('class', 'refine-loop-dot')
    .attr('r', 3)
    .attr('fill', colors.rose.stroke)
    .attr('opacity', 0);

  function animateLoopDot() {
    const path = document.getElementById('refine-loop-path');
    if (!path) return;
    const len = path.getTotalLength();
    loopDot
      .attr('opacity', 0)
      .transition()
      .delay(600)
      .duration(0)
      .attr('opacity', 0.8)
      .transition()
      .duration(1800)
      .ease(d3.easeLinear)
      .attrTween('cx', () => (t) => path.getPointAtLength(t * len).x)
      .attrTween('cy', () => (t) => path.getPointAtLength(t * len).y)
      .transition()
      .duration(200)
      .attr('opacity', 0)
      .on('end', animateLoopDot);
  }
  animateLoopDot();
}

// ─── Animated flow dots (host → aggregate) ─────────────────────────
if (!reducedMotion) {
  const dotLayer = g.append('g').attr('class', 'flow-dots');

  hosts.forEach((h, i) => {
    const x1 = h.x + nodeW / 2;
    const y1 = h.y + nodeH;
    const x2 = agg.x + nodeW / 2;
    const y2 = agg.y;

    const dot = dotLayer.append('circle')
      .attr('class', 'flow-dot')
      .attr('r', 3)
      .attr('fill', colors.blue.stroke)
      .attr('opacity', 0.7);

    function animateDot() {
      dot
        .attr('cx', x1)
        .attr('cy', y1)
        .attr('opacity', 0)
        .transition()
        .delay(i * 300)
        .duration(0)
        .attr('opacity', 0.7)
        .transition()
        .duration(1000)
        .ease(d3.easeLinear)
        .attr('cx', x2)
        .attr('cy', y2)
        .transition()
        .duration(200)
        .attr('opacity', 0)
        .on('end', animateDot);
    }
    animateDot();
  });
}

// ─── Row labels ────────────────────────────────────────────────────
const labelX = hostStartX - 60;

g.append('text')
  .attr('x', labelX)
  .attr('y', hostY + nodeH / 2 + 4)
  .attr('text-anchor', 'end')
  .attr('fill', textDim)
  .attr('font-size', '11px')
  .attr('font-weight', 600)
  .text('HOSTS');

g.append('text')
  .attr('x', labelX)
  .attr('y', opsY + nodeH / 2 + 4)
  .attr('text-anchor', 'end')
  .attr('fill', textDim)
  .attr('font-size', '11px')
  .attr('font-weight', 600)
  .text('AGGREGATE OPS');

g.append('text')
  .attr('x', labelX)
  .attr('y', artY + nodeH / 2 + 4)
  .attr('text-anchor', 'end')
  .attr('fill', textDim)
  .attr('font-size', '11px')
  .attr('font-weight', 600)
  .text('OUTPUT');

g.append('text')
  .attr('x', labelX)
  .attr('y', futureY + nodeH / 2 + 4)
  .attr('text-anchor', 'end')
  .attr('fill', textDim)
  .attr('font-size', '11px')
  .attr('font-style', 'italic')
  .attr('font-weight', 600)
  .attr('opacity', 0.4)
  .text('FUTURE');

// ─── Helper: draw a node group ─────────────────────────────────────
function drawNodes(data, container, opts = {}) {
  const { isDimmed = false, isDashed = false } = opts;

  const nodes = container.selectAll(`.node-${data[0]?.id}`)
    .data(data)
    .join('g')
      .attr('class', 'node')
      .attr('transform', d => `translate(${d.x}, ${d.y})`)
      .attr('tabindex', '-1')
      .attr('role', 'button')
      .attr('aria-expanded', d => d.children ? 'false' : null)
      .attr('aria-label', d => {
        let label = `${d.label}: ${d.sublabel}`;
        if (d.children) label += '. Click to expand details.';
        if (isDimmed) label += ' (planned feature)';
        return label;
      });

  // Background rect
  nodes.append('rect')
    .attr('width', nodeW)
    .attr('height', nodeH)
    .attr('rx', 10)
    .attr('ry', 10)
    .attr('fill', d => colors[d.color].fill)
    .attr('stroke', d => colors[d.color].stroke)
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray', isDashed ? '6,3' : null);

  // SVG accessibility
  nodes.append('title').text(d => d.label);
  nodes.append('desc').text(d => d.tooltip || d.sublabel);

  // Label
  nodes.append('text')
    .attr('class', 'node-label')
    .attr('x', nodeW / 2)
    .attr('y', d => d.children ? 22 : 24)
    .attr('text-anchor', 'middle')
    .attr('fill', d => colors[d.color].text)
    .text(d => d.label);

  // Sublabel
  nodes.append('text')
    .attr('class', 'node-sublabel')
    .attr('x', nodeW / 2)
    .attr('y', d => d.children ? 40 : 40)
    .attr('text-anchor', 'middle')
    .text(d => d.sublabel);

  // Expand hint (only for nodes with children)
  nodes.filter(d => d.children)
    .append('text')
    .attr('x', nodeW / 2)
    .attr('y', nodeH - 3)
    .attr('text-anchor', 'middle')
    .attr('fill', textDim)
    .attr('font-size', '9px')
    .attr('class', 'expand-hint')
    .text(d => `${d.children.length} details`);

  return nodes;
}

// ─── Draw all node groups ──────────────────────────────────────────
const hostGroup = g.append('g').attr('class', 'host-nodes');
const hostNodes = drawNodes(hosts, hostGroup);

const opsGroup = g.append('g').attr('class', 'ops-nodes');
const opsNodes = drawNodes(aggregateOps, opsGroup);

const artGroup = g.append('g').attr('class', 'art-nodes');
const artNodes = drawNodes(artifacts, artGroup);

const futureGroup = g.append('g').attr('class', 'future-group');
const futureNodesSel = drawNodes(futureNodes, futureGroup, {
  isDimmed: true,
  isDashed: true,
});

// "planned" badge on Architect
futureGroup.append('text')
  .attr('x', arch.x + nodeW / 2)
  .attr('y', arch.y - 8)
  .attr('text-anchor', 'middle')
  .attr('fill', colors.purple.text)
  .attr('font-size', '9px')
  .attr('font-style', 'italic')
  .attr('opacity', 0.6)
  .text('planned — build-time image composition, not runtime layers');

// Set first focusable node
hostGroup.select('.node').attr('tabindex', '0');

// ─── Expand/collapse panels ────────────────────────────────────────
const panelGroup = g.append('g').attr('class', 'expand-panels');

// Screen reader live region
const liveRegion = document.createElement('div');
liveRegion.setAttribute('role', 'status');
liveRegion.setAttribute('aria-live', 'polite');
liveRegion.className = 'sr-only';
document.body.appendChild(liveRegion);

// Tooltip descriptions
const tooltipDescContainer = document.createElement('div');
tooltipDescContainer.className = 'sr-only';
document.body.appendChild(tooltipDescContainer);

allNodes.filter(n => n.tooltip).forEach(n => {
  const descEl = document.createElement('span');
  descEl.id = `desc-${n.id}`;
  descEl.textContent = n.tooltip;
  tooltipDescContainer.appendChild(descEl);
});

// Apply aria-describedby to nodes with tooltips
g.selectAll('.node')
  .filter((d) => d && d.tooltip)
  .attr('aria-describedby', d => `desc-${d.id}`);

function renderExpand(nodeId, isExpanded) {
  const node = allNodes.find(n => n.id === nodeId);
  if (!node || !node.children) return;

  // Update ARIA
  g.selectAll('.node')
    .filter(d => d && d.id === nodeId)
    .attr('aria-expanded', isExpanded ? 'true' : 'false');

  // Announce to screen readers
  liveRegion.textContent = isExpanded
    ? `${node.label} expanded. ${node.children.length} details shown.`
    : `${node.label} collapsed.`;

  // Remove existing panel
  panelGroup.selectAll(`.panel-${nodeId}`).remove();
  if (!isExpanded) return;

  const panelW = 200;
  const lineH = 22;
  const headerH = 32;
  const padV = 12;
  const panelH = headerH + node.children.length * lineH + padV * 2;
  const panelX = node.x + (nodeW - panelW) / 2;
  const panelY = node.y + nodeH + 16;

  const panel = panelGroup.append('g')
    .attr('class', `panel-${nodeId}`)
    .attr('transform', `translate(${panelX}, ${panelY})`);

  // Connector
  panel.append('line')
    .attr('x1', panelW / 2)
    .attr('y1', -16)
    .attr('x2', panelW / 2)
    .attr('y2', 0)
    .attr('stroke', colors[node.color].stroke)
    .attr('stroke-width', 1)
    .attr('stroke-dasharray', '3,3')
    .attr('opacity', 0.5);

  // Panel background
  panel.append('rect')
    .attr('width', panelW)
    .attr('height', panelH)
    .attr('rx', 8)
    .attr('ry', 8)
    .attr('fill', surface)
    .attr('stroke', colors[node.color].stroke)
    .attr('stroke-width', 1)
    .attr('opacity', 0)
    .transition()
    .duration(reducedMotion ? 0 : 200)
    .attr('opacity', 1);

  // Header
  panel.append('text')
    .attr('x', 14)
    .attr('y', 22)
    .attr('fill', colors[node.color].text)
    .attr('font-size', '12px')
    .attr('font-weight', '600')
    .text(node.label)
    .attr('opacity', 0)
    .transition()
    .duration(reducedMotion ? 0 : 200)
    .attr('opacity', 1);

  // Divider
  panel.append('line')
    .attr('x1', 10)
    .attr('y1', headerH)
    .attr('x2', panelW - 10)
    .attr('y2', headerH)
    .attr('stroke', border)
    .attr('stroke-width', 0.5);

  // Children
  node.children.forEach((child, idx) => {
    const itemY = headerH + padV + idx * lineH;
    const itemG = panel.append('g')
      .attr('transform', `translate(14, ${itemY})`);

    itemG.append('circle')
      .attr('cx', 4)
      .attr('cy', 5)
      .attr('r', 2.5)
      .attr('fill', colors[node.color].stroke)
      .attr('opacity', 0.6);

    itemG.append('text')
      .attr('x', 14)
      .attr('y', 9)
      .attr('fill', textColor)
      .attr('font-size', '11px')
      .text(child.text)
      .attr('opacity', 0)
      .transition()
      .delay(reducedMotion ? 0 : idx * 30)
      .duration(reducedMotion ? 0 : 150)
      .attr('opacity', 1);

    itemG
      .on('mouseenter', (event) => {
        tooltip.show(`<strong>${child.text}</strong><br>${child.detail}`, event);
      })
      .on('mousemove', (event) => tooltip.move(event))
      .on('mouseleave', () => tooltip.hide());
  });
}

// ─── Click interaction ─────────────────────────────────────────────
g.selectAll('.node').on('click', (event, d) => {
  if (d && d.children) {
    toggleExpand(d.id, expanded, renderExpand);
  }
});

// ─── Hover tooltips ────────────────────────────────────────────────
g.selectAll('.node')
  .on('mouseenter', (event, d) => {
    if (!d) return;
    let msg = `<strong>${d.label}</strong><br>${d.tooltip || d.sublabel}`;
    if (d.children) {
      msg += expanded.get(d.id) ? ' (expanded)' : ' (click to expand)';
    }
    tooltip.show(msg, event);
  })
  .on('mousemove', (event) => tooltip.move(event))
  .on('mouseleave', () => tooltip.hide());

// ─── Keyboard navigation ──────────────────────────────────────────
setupKeyboardNav(g.selectAll('.node'), {
  onActivate: (el, data) => {
    if (data && data.id && data.children) {
      toggleExpand(data.id, expanded, renderExpand);
    }
  },
  onEscape: () => {
    let hadExpanded = false;
    for (const [nodeId, isExp] of expanded.entries()) {
      if (isExp) {
        hadExpanded = true;
        expanded.set(nodeId, false);
        renderExpand(nodeId, false);
      }
    }
    if (!hadExpanded && document.fullscreenElement) {
      document.exitFullscreen();
    }
  },
  nodeSelector: '.node',
});

// ─── Initial centering ─────────────────────────────────────────────
requestAnimationFrame(() => {
  const boundsX = Math.min(hostStartX, opsStartX, artStartX, arch.x) - 80;
  const boundsY = hostY - 30;
  const boundsW = Math.max(totalHostW, totalOpsW, totalArtW, nodeW) + 160;
  const boundsH = (futureY + nodeH + 40) - boundsY;

  centerView(svg, zoom, {
    x: boundsX,
    y: boundsY,
    width: boundsW,
    height: boundsH,
  }, { padding: 50 });
});

</script>
</body>
</html>
