<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inspectah - User Flow</title>
  <style>
    /* Diagram-specific overrides layered on top of shared theme */
    .flow-dot {
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .flow-dot { display: none !important; }
    }
    .expand-children {
      font-size: 12px;
      line-height: 1.7;
    }
    .expand-children li {
      list-style: none;
      padding: 2px 0;
    }
    .expand-children li::before {
      content: '\25B8 ';
      opacity: 0.5;
    }
    .expand-children code {
      font-family: var(--diagram-font-mono);
      font-size: 11px;
      background: rgba(96,165,250,0.1);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    .future-node rect {
      stroke-dasharray: 6,4;
    }
    .future-node text {
      opacity: 0.4;
    }
    .future-node .expand-hint {
      opacity: 0.3;
    }
  </style>
</head>
<body>
<script type="module">
import * as d3 from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';
import { createDiagramShell } from './shared/embed.js';
import { colors, textDim, text as textColor, surface, border } from './shared/theme.js';
import { setupTooltip, toggleExpand, centerView } from './shared/interactions.js';
import { setupKeyboardNav, checkReducedMotion } from './shared/accessibility.js';

// ─── Stage data ─────────────────────────────────────────────────────
const coreStages = [
  {
    id: 'discover',
    label: 'Discover',
    sublabel: 'Learn about inspectah',
    color: 'amber',
    tooltip: 'User discovers inspectah through docs, COPR, or team recommendation.',
    children: [
      { text: 'COPR / GitHub repo', detail: 'Find the project and release notes' },
      { text: 'README overview', detail: 'Understand what inspectah does' },
      { text: 'Getting Started guide', detail: 'Walkthrough of the full workflow' },
    ],
    docLink: '../getting-started.html',
  },
  {
    id: 'install',
    label: 'Install',
    sublabel: 'Get the CLI',
    color: 'amber',
    tooltip: 'Install inspectah via COPR, download binary, or build from source.',
    children: [
      { text: 'dnf copr enable ...', detail: 'Fedora / RHEL COPR installation' },
      { text: 'Binary download', detail: 'Pre-built binaries for x86_64 and aarch64' },
      { text: 'cargo install', detail: 'Build from source with Rust toolchain' },
    ],
    docLink: '../getting-started.html',
  },
  {
    id: 'first-scan',
    label: 'First Scan',
    sublabel: 'inspectah scan',
    color: 'amber',
    tooltip: 'Run the first host scan to produce a migration snapshot and artifacts.',
    children: [
      { text: 'sudo inspectah scan', detail: 'Root required for full system access' },
      { text: '--target-image', detail: 'Specify the base image for comparison' },
      { text: '--preserve-subscription', detail: 'Collect RHSM certs for automated build with inspectah build' },
      { text: 'Output tarball', detail: 'Containerfile, report, configs, snapshot JSON (+ subscription/ if preserved)' },
    ],
    docLink: '../getting-started.html',
  },
  {
    id: 'understand',
    label: 'Understand Output',
    sublabel: 'Review artifacts',
    color: 'amber',
    tooltip: 'Examine the scan results: HTML report, Containerfile, audit report.',
    children: [
      { text: 'audit-report.html', detail: 'HTML audit report with all findings' },
      { text: 'Containerfile', detail: 'Draft image build definition' },
      { text: 'audit-report.md', detail: 'Structured findings and recommendations' },
      { text: 'secrets-review.md', detail: 'Flagged credentials needing review' },
    ],
    docLink: '../understanding-output.html',
  },
  {
    id: 'refine',
    label: 'Refine',
    sublabel: 'Interactive review',
    color: 'amber',
    tooltip: 'Use the TUI or web UI to accept, reject, and customize migration decisions.',
    children: [
      { text: 'inspectah refine', detail: 'Launch web UI for interactive review (default)' },
      { text: 'inspectah refine --tui', detail: 'Launch terminal UI — keyboard-driven alternative to web UI' },
      { text: '--fresh flag', detail: 'Discard saved session state and start fresh' },
      { text: 'Accept / Reject items', detail: 'Per-item decision on what to migrate (both UIs)' },
      { text: 'Export Containerfile', detail: 'Generate refined build definition (both paths converge here)' },
      { text: 'inspectah build or manual', detail: 'Build via inspectah build (auto cert mount) or manual podman build' },
    ],
    docLink: '../refine-workflow.html',
  },
];

const singleHostStages = [
  {
    id: 'migration-artifacts',
    label: 'Migration Artifacts',
    sublabel: 'Build & deploy',
    color: 'green',
    tooltip: 'Refined Containerfile and configs ready for building. Use inspectah build for automated cert handling or podman build manually.',
    children: [
      { text: 'Refined Containerfile', detail: 'Curated image build definition' },
      { text: 'inspectah build (automated)', detail: 'Extracts tarball, mounts subscription certs, runs podman build automatically' },
      { text: 'podman build (manual)', detail: 'Build the bootc image manually with your own mount flags' },
      { text: 'config/ tree', detail: 'Config files to COPY into the image' },
      { text: 'kickstart-suggestion.ks', detail: 'Optional deploy-time settings' },
    ],
    docLink: '../understanding-output.html',
  },
];

const aggregateStages = [
  {
    id: 'aggregate-aggregate',
    label: 'Aggregate',
    sublabel: 'Cross-host analysis',
    color: 'teal',
    tooltip: 'Compute aggregate-wide intersections, outliers, and common patterns directly from host tarballs.',
    children: [
      { text: 'inspectah aggregate <tarballs>', detail: 'Aggregate command takes tarball paths directly' },
      { text: 'Package intersection', detail: 'Packages present on all hosts' },
      { text: 'Service commonality', detail: 'Services enabled across the aggregate' },
      { text: 'Outlier detection', detail: 'Host-specific deviations from baseline' },
      { text: 'Config convergence', detail: 'Shared vs. divergent configurations' },
    ],
    docLink: '../aggregate-workflow.html',
  },
  {
    id: 'aggregate-refine',
    label: 'Aggregate Refine',
    sublabel: 'Aggregate-wide decisions',
    color: 'teal',
    tooltip: 'Review aggregate-aggregated findings and make decisions at scale.',
    children: [
      { text: 'inspectah aggregate refine', detail: 'Interactive aggregate review UI' },
      { text: 'Bulk accept / reject', detail: 'Apply decisions across all hosts' },
      { text: 'Per-host overrides', detail: 'Customize decisions for outlier hosts' },
    ],
    docLink: '../aggregate-workflow.html',
  },
];

const futureStages = [
  {
    id: 'architect',
    label: 'Architect',
    sublabel: 'planned',
    color: 'purple',
    tooltip: 'Planned capability — not yet available in the Rust CLI.',
    isFuture: true,
    children: [
      { text: 'Image composition plan', detail: 'Multi-layer image architecture' },
      { text: 'Dependency graph', detail: 'Package and service dependency analysis' },
      { text: 'Optimization hints', detail: 'Layer ordering and size recommendations' },
    ],
  },
];

// ─── Shell setup ─────────────────────────────────────────────────────
const { svg, g, width, height, zoom } = createDiagramShell({
  title: 'User Flow',
  backUrl: '../getting-started.html',
  legendItems: [
    { color: colors.amber.stroke,  label: 'User Journey' },
    { color: colors.green.stroke,  label: 'Output' },
    { color: colors.teal.stroke,   label: 'Aggregate Path' },
    { color: colors.purple.stroke, label: 'Future Direction' },
  ],
});

const reducedMotion = checkReducedMotion();
const tooltip = setupTooltip(document.body);
const expanded = new Map();

// ─── Layout constants ────────────────────────────────────────────────
const nodeW = 170;
const nodeH = 64;
const gapX = 55;
const gapY = 100;

// Core row: horizontal left-to-right
const totalCoreW = coreStages.length * (nodeW + gapX) - gapX;
const startX = (width - totalCoreW) / 2;
const coreY = height / 2 - 120;

coreStages.forEach((s, i) => {
  s.x = startX + i * (nodeW + gapX);
  s.y = coreY;
});

// Branch point is the Refine node
const refineNode = coreStages[coreStages.length - 1];
const branchX = refineNode.x + nodeW + gapX;

// Single host path: below-left from branch
singleHostStages[0].x = branchX;
singleHostStages[0].y = coreY - gapY - 20;

// Aggregate path: below from branch
const aggregateStartX = branchX;
aggregateStages.forEach((s, i) => {
  s.x = aggregateStartX + i * (nodeW + gapX);
  s.y = coreY + gapY + 20;
});

// Future direction: after aggregate refine, offset right-down
const lastAggregate = aggregateStages[aggregateStages.length - 1];
futureStages[0].x = lastAggregate.x + nodeW + gapX;
futureStages[0].y = lastAggregate.y;

// Combine all stages for rendering
const allStages = [...coreStages, ...singleHostStages, ...aggregateStages, ...futureStages];

// ─── Connector definitions ──────────────────────────────────────────
const connectorDefs = [];

// Core chain: Discover → Install → First Scan → Understand → Refine
for (let i = 0; i < coreStages.length - 1; i++) {
  connectorDefs.push({
    from: coreStages[i],
    to: coreStages[i + 1],
    type: 'core',
  });
}

// Branch: Refine → Migration Artifacts (single host)
connectorDefs.push({
  from: refineNode,
  to: singleHostStages[0],
  type: 'branch-single',
  label: 'Single Host',
});

// Branch: Refine → Aggregate
connectorDefs.push({
  from: refineNode,
  to: aggregateStages[0],
  type: 'branch-aggregate',
  label: 'Aggregate',
});

// Aggregate chain
for (let i = 0; i < aggregateStages.length - 1; i++) {
  connectorDefs.push({
    from: aggregateStages[i],
    to: aggregateStages[i + 1],
    type: 'aggregate',
  });
}

// Future: Aggregate Refine → Architect (dashed)
connectorDefs.push({
  from: lastAggregate,
  to: futureStages[0],
  type: 'future',
});

// ─── Draw connectors ────────────────────────────────────────────────
const connectors = g.append('g').attr('class', 'connectors');

connectorDefs.forEach(c => {
  const x1 = c.from.x + nodeW;
  const y1 = c.from.y + nodeH / 2;
  const x2 = c.to.x;
  const y2 = c.to.y + nodeH / 2;
  const isFuture = c.type === 'future';

  // Determine color for the arrow marker
  let markerColor = 'default';
  if (c.type === 'branch-aggregate' || c.type === 'aggregate') markerColor = 'teal';
  else if (c.type === 'branch-single') markerColor = 'green';
  else if (isFuture) markerColor = 'purple';

  // Determine stroke color
  let strokeColor = border;
  if (c.type === 'branch-aggregate' || c.type === 'aggregate') strokeColor = colors.teal.stroke;
  else if (c.type === 'branch-single') strokeColor = colors.green.stroke;
  else if (isFuture) strokeColor = colors.purple.stroke;

  if (Math.abs(y2 - y1) < 5) {
    // Straight horizontal connector
    const line = connectors.append('line')
      .attr('x1', x1)
      .attr('y1', y1)
      .attr('x2', x2)
      .attr('y2', y2)
      .attr('stroke', strokeColor)
      .attr('stroke-width', 1.5)
      .attr('marker-end', `url(#arrow-${markerColor})`);

    if (isFuture) {
      line.attr('stroke-dasharray', '6,4')
        .attr('opacity', 0.4);
    }
  } else {
    // Curved connector for branch paths
    const midX = (x1 + x2) / 2;
    const path = `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;

    const pathEl = connectors.append('path')
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', strokeColor)
      .attr('stroke-width', 1.5)
      .attr('marker-end', `url(#arrow-${markerColor})`);

    if (isFuture) {
      pathEl.attr('stroke-dasharray', '6,4')
        .attr('opacity', 0.4);
    }

    // Branch label
    if (c.label) {
      const labelX = midX;
      const labelY = (y1 + y2) / 2 + (y2 > y1 ? -8 : 8);
      connectors.append('text')
        .attr('x', labelX)
        .attr('y', labelY)
        .attr('text-anchor', 'middle')
        .attr('fill', textDim)
        .attr('font-size', '10px')
        .attr('font-style', 'italic')
        .text(c.label);
    }
  }
});

// ─── Draw nodes ─────────────────────────────────────────────────────
const nodeGroup = g.append('g').attr('class', 'nodes');

const nodes = nodeGroup.selectAll('.node')
  .data(allStages)
  .join('g')
    .attr('class', d => d.isFuture ? 'node future-node' : 'node')
    .attr('transform', d => `translate(${d.x}, ${d.y})`)
    .attr('tabindex', (d, i) => i === 0 ? '0' : '-1')
    .attr('role', 'button')
    .attr('aria-expanded', 'false')
    .attr('aria-label', d => {
      const futurePrefix = d.isFuture ? '(Planned) ' : '';
      return `${futurePrefix}${d.label}: ${d.sublabel}. Click to expand details.`;
    });

// Background rect
nodes.append('rect')
  .attr('width', nodeW)
  .attr('height', nodeH)
  .attr('rx', 10)
  .attr('ry', 10)
  .attr('fill', d => colors[d.color].fill)
  .attr('stroke', d => colors[d.color].stroke)
  .attr('stroke-width', 1.5)
  .attr('opacity', d => d.isFuture ? 0.4 : 1);

// SVG accessibility
nodes.append('title')
  .text(d => d.isFuture ? `${d.label} (planned)` : d.label);

nodes.append('desc')
  .text(d => d.tooltip);

// Label text
nodes.append('text')
  .attr('class', 'node-label')
  .attr('x', nodeW / 2)
  .attr('y', 26)
  .attr('text-anchor', 'middle')
  .attr('fill', d => colors[d.color].text)
  .text(d => d.label);

// Sublabel text
nodes.append('text')
  .attr('class', 'node-sublabel')
  .attr('x', nodeW / 2)
  .attr('y', 44)
  .attr('text-anchor', 'middle')
  .text(d => d.sublabel);

// "planned" label for future nodes
nodes.filter(d => d.isFuture)
  .append('text')
  .attr('x', nodeW / 2)
  .attr('y', nodeH - 4)
  .attr('text-anchor', 'middle')
  .attr('fill', colors.purple.text)
  .attr('font-size', '9px')
  .attr('font-style', 'italic')
  .attr('opacity', 0.4)
  .text('planned');

// Expand indicator for non-future nodes
nodes.filter(d => !d.isFuture)
  .append('text')
  .attr('x', nodeW / 2)
  .attr('y', nodeH - 4)
  .attr('text-anchor', 'middle')
  .attr('fill', textDim)
  .attr('font-size', '9px')
  .attr('class', 'expand-hint')
  .text(d => d.children ? `${d.children.length} details` : '');

// ─── Expand/collapse panels ────────────────────────────────────────
const panelGroup = g.append('g').attr('class', 'expand-panels');

// Hidden live region for screen readers
const liveRegion = document.createElement('div');
liveRegion.setAttribute('role', 'status');
liveRegion.setAttribute('aria-live', 'polite');
liveRegion.className = 'sr-only';
document.body.appendChild(liveRegion);

// Tooltip descriptions via aria-describedby
const tooltipDescContainer = document.createElement('div');
tooltipDescContainer.className = 'sr-only';
document.body.appendChild(tooltipDescContainer);

allStages.forEach(s => {
  const descEl = document.createElement('span');
  descEl.id = `desc-${s.id}`;
  descEl.textContent = s.tooltip;
  tooltipDescContainer.appendChild(descEl);
});

nodes.attr('aria-describedby', d => `desc-${d.id}`);

function renderExpand(nodeId, isExpanded) {
  const stage = allStages.find(s => s.id === nodeId);
  if (!stage || !stage.children) return;

  // Update ARIA
  nodes.filter(d => d.id === nodeId)
    .attr('aria-expanded', String(isExpanded));

  // Remove existing panel for this node
  panelGroup.selectAll(`.panel-${nodeId}`).remove();

  if (!isExpanded) {
    liveRegion.textContent = `${stage.label} collapsed.`;
    return;
  }

  liveRegion.textContent = `${stage.label} expanded. ${stage.children.length} items.`;

  const panelW = 220;
  const lineH = 22;
  const headerH = 32;
  const padV = 12;
  const docLinkH = stage.docLink ? 24 : 0;
  const cliCmdH = stage.children.some(c => c.text.startsWith('sudo') || c.text.startsWith('inspectah') || c.text.startsWith('dnf')) ? 0 : 0;
  const panelH = headerH + stage.children.length * lineH + padV * 2 + docLinkH;

  // Place panel below the node, or above if it's in the upper region
  const panelX = stage.x + (nodeW - panelW) / 2;
  const panelBelow = stage.y + nodeH + 16;
  const panelY = panelBelow;

  const panel = panelGroup.append('g')
    .attr('class', `panel-${nodeId}`)
    .attr('transform', `translate(${panelX}, ${panelY})`);

  // Connector line from node to panel
  panel.append('line')
    .attr('x1', panelW / 2)
    .attr('y1', -16)
    .attr('x2', panelW / 2)
    .attr('y2', 0)
    .attr('stroke', colors[stage.color].stroke)
    .attr('stroke-width', 1)
    .attr('stroke-dasharray', '3,3')
    .attr('opacity', 0.5);

  // Panel background
  panel.append('rect')
    .attr('width', panelW)
    .attr('height', panelH)
    .attr('rx', 8)
    .attr('ry', 8)
    .attr('fill', surface)
    .attr('stroke', colors[stage.color].stroke)
    .attr('stroke-width', 1)
    .attr('opacity', 0)
    .transition()
    .duration(reducedMotion ? 0 : 200)
    .attr('opacity', stage.isFuture ? 0.6 : 1);

  // Header
  panel.append('text')
    .attr('x', 14)
    .attr('y', 22)
    .attr('fill', colors[stage.color].text)
    .attr('font-size', '12px')
    .attr('font-weight', '600')
    .text(stage.label)
    .attr('opacity', 0)
    .transition()
    .duration(reducedMotion ? 0 : 200)
    .attr('opacity', stage.isFuture ? 0.5 : 1);

  // Divider
  panel.append('line')
    .attr('x1', 10)
    .attr('y1', headerH)
    .attr('x2', panelW - 10)
    .attr('y2', headerH)
    .attr('stroke', border)
    .attr('stroke-width', 0.5);

  // Children items
  stage.children.forEach((child, idx) => {
    const itemY = headerH + padV + idx * lineH;
    const itemG = panel.append('g')
      .attr('transform', `translate(14, ${itemY})`);

    // Dot
    itemG.append('circle')
      .attr('cx', 4)
      .attr('cy', 5)
      .attr('r', 2.5)
      .attr('fill', colors[stage.color].stroke)
      .attr('opacity', 0.6);

    // Label
    itemG.append('text')
      .attr('x', 14)
      .attr('y', 9)
      .attr('fill', textColor)
      .attr('font-size', '11px')
      .text(child.text)
      .attr('opacity', 0)
      .transition()
      .delay(reducedMotion ? 0 : idx * 30)
      .duration(reducedMotion ? 0 : 150)
      .attr('opacity', stage.isFuture ? 0.5 : 1);

    // Tooltip on hover for detail
    itemG
      .on('mouseenter', (event) => {
        tooltip.show(`<strong>${child.text}</strong><br>${child.detail}`, event);
      })
      .on('mousemove', (event) => tooltip.move(event))
      .on('mouseleave', () => tooltip.hide());
  });

  // Doc link at bottom of panel
  if (stage.docLink) {
    const linkY = headerH + padV + stage.children.length * lineH + padV;
    const linkG = panel.append('g')
      .attr('transform', `translate(14, ${linkY})`)
      .style('cursor', 'pointer')
      .on('click', () => { window.location.href = stage.docLink; });

    linkG.append('text')
      .attr('x', 0)
      .attr('y', 9)
      .attr('fill', colors.blue.stroke)
      .attr('font-size', '10px')
      .text('→ View docs');
  }
}

// ─── Click interaction ──────────────────────────────────────────────
nodes.on('click', (event, d) => {
  toggleExpand(d.id, expanded, renderExpand);
});

// ─── Hover tooltips on main nodes ───────────────────────────────────
nodes
  .on('mouseenter', (event, d) => {
    const expandState = expanded.get(d.id) ? ' (expanded)' : ' (click to expand)';
    tooltip.show(`<strong>${d.label}</strong><br>${d.tooltip}${expandState}`, event);
  })
  .on('mousemove', (event) => tooltip.move(event))
  .on('mouseleave', () => tooltip.hide());

// ─── Keyboard navigation ───────────────────────────────────────────
setupKeyboardNav(nodes, {
  onActivate: (el, data) => {
    if (data && data.id) {
      toggleExpand(data.id, expanded, renderExpand);
    }
  },
  onEscape: () => {
    // Collapse all expanded panels
    let hadExpanded = false;
    for (const [nodeId, isExp] of expanded.entries()) {
      if (isExp) {
        hadExpanded = true;
        expanded.set(nodeId, false);
        renderExpand(nodeId, false);
      }
    }
    // If nothing was expanded, exit fullscreen
    if (!hadExpanded && document.fullscreenElement) {
      document.exitFullscreen();
    }
  },
  nodeSelector: '.node',
});

// ─── Initial centering ──────────────────────────────────────────────
requestAnimationFrame(() => {
  // Compute bounding box of all nodes
  const minX = Math.min(...allStages.map(s => s.x));
  const maxX = Math.max(...allStages.map(s => s.x + nodeW));
  const minY = Math.min(...allStages.map(s => s.y));
  const maxY = Math.max(...allStages.map(s => s.y + nodeH));

  centerView(svg, zoom, {
    x: minX - 40,
    y: minY - 80,
    width: (maxX - minX) + 80,
    height: (maxY - minY) + 300,
  }, { padding: 60 });
});

</script>
</body>
</html>
